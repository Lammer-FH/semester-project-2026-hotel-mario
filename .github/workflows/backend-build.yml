name: Backend Build & Test

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'bugfix/**'
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/backend-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/backend-build.yml'

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build backend
        run: |
          cd backend
          chmod +x gradlew
          ./gradlew clean build --info

      - name: Run tests
        run: |
          cd backend
          ./gradlew test

      - name: Generate test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: backend/build/reports/tests/test/

      - name: Check for build failures
        if: failure()
        run: |
          echo "❌ Build or tests failed!"
          exit 1

      - name: Success message
        if: success()
        run: |
          echo "✅ Backend build and tests passed successfully!"
