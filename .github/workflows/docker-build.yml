name: Docker Build & Test

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'release/**'
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            hotelmario:latest
            hotelmario:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image build
        run: |
          docker image inspect hotelmario:latest
          echo "✅ Docker image built successfully"
          echo ""
          echo "Image details:"
          docker image ls | grep hotelmario

      - name: Test image with Docker Compose
        run: |
          docker compose build
          docker compose up -d
          echo "Waiting for services..."
          sleep 15
          
          echo "Checking service health..."
          docker compose ps
          
          echo "Testing MySQL..."
          docker compose exec -T mysql mysqladmin ping -h localhost -u hotelmario -photelmario_password
          
          echo "✅ Docker Compose integration successful"

      - name: Cleanup test environment
        if: always()
        run: |
          docker compose down -v || true
          echo "✅ Test environment cleaned up"

      - name: Build summary
        run: |
          echo "========================================="
          echo "Docker Build Summary"
          echo "========================================="
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Image: hotelmario:latest"
          echo "Tag: hotelmario:${{ github.sha }}"
          echo ""
          echo "✅ Build completed successfully"
          echo ""
          echo "Note: This is a GitHub Classroom environment."
          echo "Docker images are built locally and not pushed to a registry."
          echo "========================================="

