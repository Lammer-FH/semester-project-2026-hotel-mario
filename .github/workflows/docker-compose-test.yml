name: Docker Compose Test

on:
  push:
    branches:
      - main
      - 'feature/**'
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/docker-compose-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/docker-compose-test.yml'

jobs:
  test:
    name: Test Docker Compose Setup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."
          sleep 10

      - name: Check service health
        run: |
          echo "Checking MySQL..."
          docker compose exec -T mysql mysqladmin ping -h localhost -u hotelmario -photelmario_password
          
          echo "Checking Spring Boot..."
          docker compose ps
          
          echo "Checking application port..."
          timeout 30 bash -c 'until curl -s http://localhost:8080/actuator/health >/dev/null 2>&1; do sleep 2; done' || echo "Health check endpoint not available (expected for first deployments)"

      - name: View application logs
        if: always()
        run: |
          echo "=== MySQL Logs ==="
          docker compose logs mysql | tail -20
          echo ""
          echo "=== Spring Boot Logs ==="
          docker compose logs spring-boot | tail -50

      - name: Verify network communication
        run: |
          echo "Testing network communication..."
          docker compose exec -T spring-boot ping -c 2 mysql || echo "Ping test not available"

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
          echo "✅ Docker Compose test completed"
