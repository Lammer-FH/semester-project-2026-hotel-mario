spring.application.name=hotelmario

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotelmario_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:hotelmario}
spring.datasource.password=${DB_PASSWORD:hotelmario_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Set DB_DDL_AUTO=validate in production (requires a migration tool such as Flyway).
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# swagger configuration
springdoc.api-docs.path=/api-docs
server.servlet.contextPath=${API_PREFIX:/api}
server.port=8080
