<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Hotel Technikum</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav>
        <div>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="rooms.html">Rooms</a>
        </div>
    </nav>
</header>

<section class="hero">
	<div class="info-box">
		<h1>Boutique Hotel Technikum</h1>
		<p>Welcome to our Hotel Website!</p>
		
		<div>
			<a href="about.html" class="btn">About Us</a>
			<a href="rooms.html" class="btn">Rooms</a>
		</div>
		
		<div class="slideshow-container">

			<div class="mySlides fade">
			  <div class="numbertext">1 / 3</div>
			  <img src="images/img_placeholder1.jpg" style="width:100%">
			  <div class="text">Caption Text</div>
			</div>

			<div class="mySlides fade">
			  <div class="numbertext">2 / 3</div>
			  <img src="images/img_placeholder2.jpg" style="width:100%">
			  <div class="text">Caption Two</div>
			</div>

			<div class="mySlides fade">
			  <div class="numbertext">3 / 3</div>
			  <img src="images/img_placeholder3.jpg" style="width:100%">
			  <div class="text">Caption Three</div>
			</div>

			<a class="prev" onclick="plusSlides(-1)">❮</a>
			<a class="next" onclick="plusSlides(1)">❯</a>

		</div>
		<br>

		<div style="text-align:center">
		  <span class="dot" onclick="currentSlide(1)"></span> 
		  <span class="dot" onclick="currentSlide(2)"></span> 
		  <span class="dot" onclick="currentSlide(3)"></span> 
		</div>
		
		<p>Book now to get the room you deserve.</p>

		<a href="rooms.html" class="btn">Find the perfect room now!</a>
	</div>
</section>

<footer>
    <p>© 2026 Boutique Hotel Technikum</p>
	<div>
        <a href="about.html" class="btn">About Us</a>
        <a href="imprint.html" class="btn">Imprint</a>
    </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
